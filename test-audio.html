<!DOCTYPE html>
<html>
<head>
  <title>Audio Test</title>
</head>
<body>
  <h1>Audio Loading Test</h1>
  <div id="status">Loading...</div>
  <script>
    const filename = '陳綺貞 - After 17 [4vj3RkD49xY].mp3';
    const url = `http://localhost:3001/api/downloads/${encodeURIComponent(filename)}`;
    document.getElementById('status').textContent = 'URL: ' + url;

    const audio = new Audio();
    audio.src = url;

    audio.addEventListener('loadedmetadata', () => {
      document.getElementById('status').textContent = `SUCCESS! Duration: ${audio.duration} seconds`;
      console.log('Duration:', audio.duration);
    });

    audio.addEventListener('error', (e) => {
      document.getElementById('status').textContent = 'ERROR: ' + audio.error.code + ' - ' + audio.error.message;
      console.error('Error:', audio.error);
    });

    setTimeout(() => {
      if (!audio.duration) {
        document.getElementById('status').textContent = 'TIMEOUT - No duration loaded';
      }
    }, 5000);
  </script>
</body>
</html>
